version: 2.1

orbs:
  orb-tools: circleci/orb-tools@12.0
  node: circleci/node@7.1.0
  core: {}

filters: &filters
  tags:
    only: /.*/

release-filters: &release-filters
  branches:
    ignore: /.*/
  tags:
    only: /^v[0-9]+\.[0-9]+\.[0-9]+$/

jobs:
  ensure-npm-version:
    executor: core/node
    steps:
      - core/ensure_pkg_manager:
          pkg_manager: npm@latest
      - run:
          name: Validate version
          command: |
            NPM_LATEST_VERSION=$(npm view npm version)
            if ! npm --version | grep -q "$NPM_LATEST_VERSION"; then
              echo "npm version $NPM_LATEST_VERSION not found"
              exit 1
            fi
  ensure-pnpm-version:
    executor: core/node_secrets
    steps:
      - core/ensure_pkg_manager:
          pkg_manager: pnpm@latest
      - run:
          name: Validate version
          command: |
            PNPM_LATEST_VERSION=$(npm view pnpm version)
            if ! pnpm --version | grep -q "$PNPM_LATEST_VERSION"; then
              echo "pnpm version $PNPM_LATEST_VERSION not found"
              exit 1
            fi
  ensure-pnpm-fresh-install:
    docker:
      - image: node:lts-slim
    resource_class: medium
    steps:
      - core/ensure_pkg_manager:
          pkg_manager: pnpm
      - run:
          name: Validate version
          command: |
            PNPM_LATEST_VERSION=$(npm view pnpm version)
            if ! pnpm --version | grep -q "$PNPM_LATEST_VERSION"; then
              echo "pnpm version $PNPM_LATEST_VERSION not found"
              exit 1
            fi
  ensure-pnpm-machine-install:
    machine:
      image: ubuntu-2404:current
    steps:
      - node/install
      - core/ensure_pkg_manager:
          pkg_manager: pnpm
      - run:
          name: Validate version
          command: |
            PNPM_LATEST_VERSION=$(npm view pnpm version)
            if ! pnpm --version | grep -q "$PNPM_LATEST_VERSION"; then
              echo "pnpm version $PNPM_LATEST_VERSION not found"
              exit 1
            fi
  ensure-default-pkg-manager-env:
    executor: core/node
    environment:
      DEFAULT_PKG_MANAGER: pnpm@next-10
    steps:
      - core/ensure_pkg_manager
      - run:
          name: Validate version and metadata ownership
          command: |
            PNPM_NEXT_10_VERSION=$(npm view pnpm dist-tags.next-10)
            if ! pnpm --version | grep -q "$PNPM_NEXT_10_VERSION"; then
              echo "pnpm version $PNPM_NEXT_10_VERSION not found"
              exit 1
            fi
            if [ -f /tmp/node-pkg-manager ]; then
              echo "ensure_pkg_manager should not create package manager cache metadata"
              exit 1
            fi
            if [ -f /tmp/node-version ]; then
              echo "ensure_pkg_manager should not create Node.js version cache metadata"
              exit 1
            fi

  install-dependencies-npm-node-18:
    executor:
      name: core/node_secrets
      tag: "18"
    steps:
      - checkout
      - core/ensure_pkg_manager:
          pkg_manager: npm
      - core/install_dependencies:
          pkg_manager: npm
          pkg_json_dir: ~/project/sample
          cache_version: node18_v7
      - run:
          name: Validate npm dependency cache cleanup
          command: |
            if [ -d "$HOME/.cache/pipeline-core-orb/dependency-cache" ]; then
              echo "Expected dependency cache staging root to be removed"
              exit 1
            fi
            NPM_CACHE_DIR=$(npm config get cache)
            if [ ! -d "$NPM_CACHE_DIR" ]; then
              echo "Expected npm cache directory to remain after staging cleanup"
              exit 1
            fi
            if [ -f /tmp/node-pkg-manager ]; then
              echo "Expected package manager cache metadata to be removed"
              exit 1
            fi
            if [ -f /tmp/node-version ]; then
              echo "Expected Node.js version cache metadata to be removed"
              exit 1
            fi
      - run: cd ~/project/sample && npm run build
  install-dependencies-pnpm-node-18:
    executor:
      name: core/node
      tag: "18.20"
    steps:
      - checkout
      - core/ensure_pkg_manager:
          pkg_manager: pnpm
      - core/install_dependencies:
          pkg_manager: pnpm
          pkg_json_dir: ~/project/sample
          cache_version: node18_v7
      - run:
          name: Validate pnpm dependency cache cleanup
          command: |
            if [ -d "$HOME/.cache/pipeline-core-orb/dependency-cache" ]; then
              echo "Expected dependency cache staging root to be removed"
              exit 1
            fi
            PNPM_STORE_DIR=$(pnpm store path)
            if [ ! -d "$PNPM_STORE_DIR" ]; then
              echo "Expected pnpm store directory to remain after staging cleanup"
              exit 1
            fi
            if [ -f /tmp/node-pkg-manager ]; then
              echo "Expected package manager cache metadata to be removed"
              exit 1
            fi
            if [ -f /tmp/node-version ]; then
              echo "Expected Node.js version cache metadata to be removed"
              exit 1
            fi
      - run: cd ~/project/sample && pnpm run build
  install-dependencies-custom-command:
    executor: core/node
    steps:
      - checkout
      - core/ensure_pkg_manager:
          pkg_manager: pnpm@10.5.1
      - core/install_dependencies:
          pkg_manager: pnpm
          pkg_json_dir: ~/project/sample
          install_command: pnpm install
          cache_version: v10
      - run: cd ~/project/sample && pnpm run build
  install-dependencies-default-pkg-manager-env:
    executor: core/node
    environment:
      DEFAULT_PKG_MANAGER: pnpm@next-10
    steps:
      - checkout
      - core/ensure_pkg_manager
      - core/install_dependencies:
          pkg_json_dir: ~/project/sample
          cache_version: default_env_v1
      - run:
          name: Validate default package manager dependency cache cleanup
          command: |
            if [ -d "$HOME/.cache/pipeline-core-orb/dependency-cache" ]; then
              echo "Expected dependency cache staging root to be removed"
              exit 1
            fi
            PNPM_STORE_DIR=$(pnpm store path)
            if [ ! -d "$PNPM_STORE_DIR" ]; then
              echo "Expected pnpm store directory to remain after staging cleanup"
              exit 1
            fi
            if [ -f /tmp/node-pkg-manager ]; then
              echo "Expected package manager cache metadata to be removed"
              exit 1
            fi
            if [ -f /tmp/node-version ]; then
              echo "Expected Node.js version cache metadata to be removed"
              exit 1
            fi
      - run: cd ~/project/sample && pnpm run build
  install-dependencies-preinstalled-npm:
    executor: core/node
    steps:
      - checkout
      - core/install_dependencies:
          pkg_manager: npm
          pkg_json_dir: ~/project/sample
          cache_version: external_preinstalled_npm_v1
      - run: cd ~/project/sample && npm run build
  install-dependencies-externally-installed-pnpm:
    executor: core/node
    steps:
      - checkout
      - run:
          name: Install pnpm externally
          command: sudo npm install -g pnpm@10.5.1
      - core/install_dependencies:
          pkg_manager: pnpm
          pkg_json_dir: ~/project/sample
          cache_version: external_installed_pnpm_v1
      - run: cd ~/project/sample && pnpm run build

  run-script-npm:
    executor: core/node
    steps:
      - checkout
      - core/ensure_pkg_manager:
          pkg_manager: npm
      - core/install_dependencies:
          pkg_manager: npm
          pkg_json_dir: ~/project/sample
      - core/run_script:
          pkg_manager: npm
          pkg_json_dir: ~/project/sample
          script: test
          script_args: --json --outputFile=results_npm.json
      - run:
          name: Print output file
          working_directory: ~/project/sample
          command: cat results_npm.json
  run-script-pnpm:
    executor: core/node
    steps:
      - checkout
      - core/ensure_pkg_manager:
          pkg_manager: pnpm@latest-10
      - core/install_dependencies:
          pkg_manager: pnpm
          pkg_json_dir: ~/project/sample
      - core/run_script:
          pkg_manager: pnpm
          pkg_json_dir: ~/project/sample
          script: test
          script_args: --json --outputFile=results_pnpm.json
      - run:
          name: Print output file
          working_directory: ~/project/sample
          command: cat results_pnpm.json
  run-script-default-pkg-manager-env:
    executor: core/node
    environment:
      DEFAULT_PKG_MANAGER: pnpm@next-10
    steps:
      - checkout
      - core/ensure_pkg_manager
      - core/install_dependencies:
          pkg_json_dir: ~/project/sample
      - core/run_script:
          pkg_json_dir: ~/project/sample
          script: test
          script_args: --json --outputFile=results_pnpm_default.json
      - run:
          name: Validate run_script metadata ownership
          command: |
            if [ -f /tmp/node-pkg-manager ]; then
              echo "run_script should not create package manager cache metadata"
              exit 1
            fi
            if [ -f /tmp/node-version ]; then
              echo "run_script should not create Node.js version cache metadata"
              exit 1
            fi
      - run:
          name: Print output file
          working_directory: ~/project/sample
          command: cat results_pnpm_default.json
  run-script-externally-prepared-pnpm:
    executor: core/node
    steps:
      - checkout
      - run:
          name: Install pnpm externally
          command: sudo npm install -g pnpm@10.5.1
      - run:
          name: Install dependencies externally
          command: pnpm install --frozen-lockfile
          working_directory: ~/project/sample
      - core/run_script:
          pkg_manager: pnpm
          pkg_json_dir: ~/project/sample
          script: test
          script_args: --json --outputFile=results_external_pnpm.json
      - run:
          name: Print output file
          working_directory: ~/project/sample
          command: cat results_external_pnpm.json
  run-script-npm-workspace:
    executor: core/node
    steps:
      - checkout
      - core/run_script:
          pkg_manager: npm
          pkg_json_dir: ~/project/sample/workspace
          script: workspace-test
          script_args: workspace-result-npm.txt npm workspace
          run_options: --workspace=workspace-app
      - run:
          name: Validate npm workspace script output
          working_directory: ~/project/sample/workspace/packages/app
          command: |
            if [ "$(cat workspace-result-npm.txt)" != "npm|workspace" ]; then
              echo "Unexpected npm workspace script output"
              exit 1
            fi
      - run:
          name: Clean npm workspace script output
          working_directory: ~/project/sample/workspace/packages/app
          command: rm -f workspace-result-npm.txt
  run-script-pnpm-workspace:
    executor: core/node
    steps:
      - checkout
      - core/ensure_pkg_manager:
          pkg_manager: pnpm
      - core/run_script:
          pkg_manager: pnpm
          pkg_json_dir: ~/project/sample/workspace
          script: workspace-test
          script_args: workspace-result-pnpm.txt pnpm workspace
          run_options: --filter=workspace-app
      - run:
          name: Validate pnpm workspace script output
          working_directory: ~/project/sample/workspace/packages/app
          command: |
            if [ "$(cat workspace-result-pnpm.txt)" != "pnpm|workspace" ]; then
              echo "Unexpected pnpm workspace script output"
              exit 1
            fi
      - run:
          name: Clean pnpm workspace script output
          working_directory: ~/project/sample/workspace/packages/app
          command: rm -f workspace-result-pnpm.txt
workflows:
  test-deploy:
    jobs:
      - ensure-npm-version:
          filters: *filters
      - ensure-pnpm-version:
          filters: *filters
      - ensure-pnpm-fresh-install:
          filters: *filters
      - ensure-pnpm-machine-install:
          filters: *filters
      - ensure-default-pkg-manager-env:
          filters: *filters
      - install-dependencies-npm-node-18:
          filters: *filters
      - install-dependencies-pnpm-node-18:
          filters: *filters
      - install-dependencies-custom-command:
          filters: *filters
      - install-dependencies-default-pkg-manager-env:
          filters: *filters
      - install-dependencies-preinstalled-npm:
          filters: *filters
      - install-dependencies-externally-installed-pnpm:
          filters: *filters
      - run-script-npm:
          filters: *filters
      - run-script-pnpm:
          filters: *filters
      - run-script-default-pkg-manager-env:
          filters: *filters
      - run-script-externally-prepared-pnpm:
          filters: *filters
      - run-script-npm-workspace:
          filters: *filters
      - run-script-pnpm-workspace:
          filters: *filters
      - core/install_and_run:
          name: install-and-run-npm
          pkg_manager: npm
          pkg_json_dir: ~/project/sample
          script: test
          script_args: --json --outputFile=results_install_and_run_npm.json
          filters: *filters
      - core/install_and_run:
          name: install-and-run-pnpm-with-hooks
          pkg_manager: pnpm
          pkg_json_dir: ~/project/sample
          script: test
          script_args: --json --outputFile=results_install_and_run_pnpm_hooks.json
          pre_install_steps:
            - run:
                name: Validate pre-install hook placement
                command: |
                  if ! command -v pnpm >/dev/null 2>&1; then
                    echo "Expected pnpm to be available before dependency installation"
                    exit 1
                  fi
                  if [ -d ~/project/sample/node_modules ]; then
                    echo "Expected dependencies not to be installed before pre-install steps"
                    exit 1
                  fi
                  echo "pre-install" > /tmp/install-and-run-hook-order
          post_install_steps:
            - run:
                name: Validate post-install hook placement
                command: |
                  if [ ! -d ~/project/sample/node_modules ]; then
                    echo "Expected dependencies to be installed before post-install steps"
                    exit 1
                  fi
                  if [ "$(cat /tmp/install-and-run-hook-order)" != "pre-install" ]; then
                    echo "Expected pre-install hook to run before post-install hook"
                    exit 1
                  fi
                  rm -f /tmp/install-and-run-hook-order
          filters: *filters
      - orb-tools/pack:
          filters: *release-filters
      - orb-tools/publish:
          orb_name: studion/core
          vcs_type: << pipeline.project.type >>
          pub_type: production
          requires:
            - orb-tools/pack
            - ensure-npm-version
            - ensure-pnpm-version
            - ensure-pnpm-fresh-install
            - ensure-pnpm-machine-install
            - ensure-default-pkg-manager-env
            - install-dependencies-npm-node-18
            - install-dependencies-pnpm-node-18
            - install-dependencies-custom-command
            - install-dependencies-default-pkg-manager-env
            - install-dependencies-preinstalled-npm
            - install-dependencies-externally-installed-pnpm
            - run-script-npm
            - run-script-pnpm
            - run-script-default-pkg-manager-env
            - run-script-externally-prepared-pnpm
            - run-script-npm-workspace
            - run-script-pnpm-workspace
            - install-and-run-npm
            - install-and-run-pnpm-with-hooks
          context: orb-publishing
          filters: *release-filters
